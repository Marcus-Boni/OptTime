<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptSolv Time Tracker</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --brand: #f97316;
        --brand-dim: #ea580c;
        --bg: #0a0a0a;
        --surface: #171717;
        --surface-2: #262626;
        --border: rgba(255, 255, 255, 0.1);
        --text: #f4f4f5;
        --muted: #a3a3a3;
        --green: #4ade80;
        --red: #f87171;
        --yellow: #facc15;
        --radius: 8px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
    <script type="module" src="./main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
