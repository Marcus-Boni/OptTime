trigger:
- main

pr:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: 24.x
  runtimeStack: NODE|24-lts
  azureServiceConnection: opt-time
  webAppName: dev-opt-time
  publicAppUrl: https://dev-opt-time-c4g0hjf0bgcae7ec.brazilsouth-01.azurewebsites.net
  buildDatabaseUrlFallback: postgresql://build:build@127.0.0.1:5432/build?sslmode=require
  packagePath: $(Build.ArtifactStagingDirectory)/app.zip
  deployFolder: $(Build.ArtifactStagingDirectory)/deploy

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildAndPackage
    displayName: Build and package Next.js app
    steps:
    - task: UseNode@1
      displayName: Use Node.js $(nodeVersion)
      inputs:
        version: $(nodeVersion)

    - script: |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm --version
      displayName: Setup pnpm

    - task: Cache@2
      displayName: Restore pnpm store cache
      inputs:
        key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
        path: $(Pipeline.Workspace)/.pnpm-store

    - script: pnpm config set store-dir $(Pipeline.Workspace)/.pnpm-store
      displayName: Configure pnpm store

    - script: pnpm install --frozen-lockfile
      displayName: Install dependencies

    - script: |
        set -e
        export DATABASE_URL="${DATABASE_URL:-$(buildDatabaseUrlFallback)}"
        export NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL:-$(publicAppUrl)}"
        export BETTER_AUTH_URL="${BETTER_AUTH_URL:-$(publicAppUrl)}"
        export BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET:-build-only-secret-123456789012345678901234567890}"
        export ENCRYPTION_KEY="${ENCRYPTION_KEY:-build-only-encryption-key-123456789012345678901234567890}"
        export RESEND_API_KEY="${RESEND_API_KEY:-re_build_placeholder}"
        export RESEND_FROM_EMAIL="${RESEND_FROM_EMAIL:-OptSolv Time <noreply@optsolv.com.br>}"
        export MICROSOFT_CLIENT_ID="${MICROSOFT_CLIENT_ID:-build-client-id}"
        export MICROSOFT_CLIENT_SECRET="${MICROSOFT_CLIENT_SECRET:-build-client-secret}"
        echo "Build configured for ${NEXT_PUBLIC_APP_URL}."
        pnpm run build
      displayName: Build app

    - script: |
        rm -rf "$(deployFolder)"
        mkdir -p "$(deployFolder)"
        cp package.json pnpm-lock.yaml "$(deployFolder)/"
        CI=true pnpm install --prod --frozen-lockfile --dir "$(deployFolder)" --config.node-linker=hoisted
        cp -R .next "$(deployFolder)/.next"
        cp -R public "$(deployFolder)/public"
      displayName: Prepare deploy package

    - script: |
        cd "$(deployFolder)"
        test -f "node_modules/next/package.json"
        test -f "node_modules/styled-jsx/package.json"
        test -f "node_modules/pg/package.json"
        test -f "node_modules/pg-protocol/dist/index.js"
        node -e "const { createRequire } = require('node:module'); const req = createRequire(process.cwd() + '/package.json'); console.log(req.resolve('styled-jsx/package.json')); console.log(req.resolve('pg-protocol/dist/index.js'));"
      displayName: Validate runtime dependencies

    - task: ArchiveFiles@2
      displayName: Archive package
      inputs:
        rootFolderOrFile: $(deployFolder)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(packagePath)
        replaceExistingArchive: true

    - publish: $(packagePath)
      artifact: drop
      displayName: Publish artifact

- stage: Deploy
  displayName: Deploy
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToProduction
    displayName: Deploy to Azure App Service
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: Deploy package to web app
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: webAppLinux
              appName: $(webAppName)
              package: $(Pipeline.Workspace)/drop/app.zip
              runtimeStack: $(runtimeStack)
              startUpCommand: node node_modules/next/dist/bin/next start -p $PORT

          - script: |
              set -e
              HEALTH_URL="$(publicAppUrl)/api/health"
              echo "Checking health endpoint: ${HEALTH_URL}"
              curl --fail --silent --show-error "${HEALTH_URL}" | tee health.json
            displayName: Smoke test /api/health
